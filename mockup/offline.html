  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"599b589c-cf4c-49f8-80e0-616014730cb9\"><\u002Fscript>\n<\u002Fhead>\n<body>\n\n<x-dc>\n<helmet>\n<style>\n  * { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; }\n  body {\n    font-family: \"PingFang SC\", \"Hiragino Sans GB\", \"Microsoft YaHei\", -apple-system, \"Segoe UI\", sans-serif;\n    -webkit-font-smoothing: antialiased;\n    color: #1D1D1F;\n  }\n  ::-webkit-scrollbar { width: 9px; height: 9px; }\n  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.14); border-radius: 999px; border: 2px solid transparent; background-clip: padding-box; }\n  ::-webkit-scrollbar-track { background: transparent; }\n  @keyframes scType { 0%, 60%, 100% { opacity: .25; transform: translateY(0); } 30% { opacity: 1; transform: translateY(-3px); } }\n  @keyframes scPulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: .35; transform: scale(.7); } }\n  @keyframes scShimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }\n  @keyframes scSpin { to { transform: rotate(360deg); } }\n  @keyframes scBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height: 100vh; padding: 52px 40px 120px; display: flex; justify-content: center; align-items: flex-start; background: radial-gradient(1100px 560px at 50% -12%, #ECE7FF 0%, transparent 60%), radial-gradient(900px 520px at 92% 116%, #E2EEFF 0%, transparent 55%), linear-gradient(180deg, #F4F2F8 0%, #EFEEF3 100%);\">\n\n  <div style=\"width: 1340px; flex: 0 0 auto; background: #FBFBFD; border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.8); box-shadow: 0 50px 130px -28px rgba(46,32,96,0.30), 0 14px 40px -12px rgba(20,16,40,0.16), inset 0 1px 0 rgba(255,255,255,0.9);\">\n\n    <!-- TITLE BAR -->\n    <div style=\"height: 50px; display: flex; align-items: center; padding: 0 20px; background: linear-gradient(180deg, #FFFFFF 0%, #F3F2F7 100%); border-bottom: 1px solid rgba(0,0,0,0.05);\">\n      <div style=\"display: flex; gap: 8px;\">\n        <span style=\"width: 12px; height: 12px; border-radius: 50%; background: #FF5F57;\"><\u002Fspan>\n        <span style=\"width: 12px; height: 12px; border-radius: 50%; background: #FEBC2E;\"><\u002Fspan>\n        <span style=\"width: 12px; height: 12px; border-radius: 50%; background: #28C840;\"><\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"flex: 1; display: flex; align-items: center; justify-content: center; gap: 9px;\">\n        <span style=\"width: 19px; height: 19px; border-radius: 6px; background: linear-gradient(135deg, #7C5CFF 0%, #3E8BFF 100%); box-shadow: 0 2px 6px rgba(90,70,200,0.3);\"><\u002Fspan>\n        <span style=\"font-size: 13px; font-weight: 600; color: #6E6E73; letter-spacing: 0.02em;\">AI 辩论台<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"width: 56px;\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- TAB BAR (login status lives here) -->\n    <div style=\"height: 56px; display: flex; align-items: center; gap: 7px; padding: 0 16px; background: linear-gradient(180deg, #F1F0F6, #EAE9F0); border-bottom: 1px solid rgba(0,0,0,0.07);\">\n      <button onclick=\"{{ goChat }}\" style=\"{{ chatTabStyle }}\">\n        <svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\"><path d=\"M14 9a2 2 0 0 1-2 2H6.5L3.5 13.3V11H4a2 2 0 0 1-2-2V4.5a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2z\"><\u002Fpath><\u002Fsvg>\n        对话\n      <\u002Fbutton>\n      <button onclick=\"{{ goPro }}\" style=\"{{ proTabStyle }}\">\n        <span style=\"width: 22px; height: 22px; border-radius: 7px; background: linear-gradient(135deg, #16161A, #3C3C46); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800;\">K<\u002Fspan>\n        <span style=\"color: #6B4DE0;\">正方<\u002Fspan>\n        <span style=\"opacity: 0.5;\">·<\u002Fspan>\n        Kimi\n        <span style=\"{{ proTabDot }}\"><\u002Fspan>\n        <sc-if value=\"{{ locked }}\" hint-placeholder-val=\"{{ false }}\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 16 16\" fill=\"none\" stroke=\"#A1A1A8\" stroke-width=\"1.6\"><rect x=\"3.5\" y=\"7\" width=\"9\" height=\"6.3\" rx=\"1.5\"><\u002Frect><path d=\"M5.5 7V5.2a2.5 2.5 0 0 1 5 0V7\"><\u002Fpath><\u002Fsvg><\u002Fsc-if>\n      <\u002Fbutton>\n      <button onclick=\"{{ goCon }}\" style=\"{{ conTabStyle }}\">\n        <span style=\"width: 22px; height: 22px; border-radius: 7px; background: linear-gradient(135deg, #2E6BFF, #4FA6FF); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800;\">通<\u002Fspan>\n        <span style=\"color: #1E72E0;\">反方<\u002Fspan>\n        <span style=\"opacity: 0.5;\">·<\u002Fspan>\n        通义千问\n        <span style=\"{{ conTabDot }}\"><\u002Fspan>\n        <sc-if value=\"{{ locked }}\" hint-placeholder-val=\"{{ false }}\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 16 16\" fill=\"none\" stroke=\"#A1A1A8\" stroke-width=\"1.6\"><rect x=\"3.5\" y=\"7\" width=\"9\" height=\"6.3\" rx=\"1.5\"><\u002Frect><path d=\"M5.5 7V5.2a2.5 2.5 0 0 1 5 0V7\"><\u002Fpath><\u002Fsvg><\u002Fsc-if>\n      <\u002Fbutton>\n      <span style=\"flex: 1;\"><\u002Fspan>\n      <span style=\"{{ phaseBadgeStyle }}\">\n        <sc-if value=\"{{ isLive }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"width: 7px; height: 7px; border-radius: 50%; background: #30D158; animation: scPulse 1.1s ease-in-out infinite;\"><\u002Fspan><\u002Fsc-if>\n        {{ phaseBadge }}\n      <\u002Fspan>\n    <\u002Fdiv>\n\n    <!-- CONTENT -->\n    <div style=\"position: relative; height: 768px; overflow: hidden;\">\n\n      <!-- ===== TAB: 对话 ===== -->\n      <sc-if value=\"{{ tabChat }}\" hint-placeholder-val=\"{{ true }}\">\n\n        <!-- config (before start) -->\n        <sc-if value=\"{{ isPrep }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"height: 768px; overflow-y: auto;\">\n            <div style=\"max-width: 1000px; margin: 0 auto; padding: 50px 64px 60px;\">\n              <div style=\"font-size: 12.5px; font-weight: 700; letter-spacing: 0.16em; color: #9A7CFF;\">新建一场辩论<\u002Fdiv>\n              <div style=\"display: flex; gap: 16px; margin-top: 16px; align-items: stretch;\">\n                <div style=\"flex: 1; display: flex; align-items: center; gap: 14px; height: 64px; padding: 0 22px; border-radius: 16px; background: #fff; border: 1px solid rgba(0,0,0,0.07); box-shadow: 0 6px 22px -10px rgba(40,30,80,0.14), inset 0 1px 0 #fff;\">\n                  <span style=\"width: 22px; height: 22px; border-radius: 7px; background: linear-gradient(135deg, #7C5CFF, #3E8BFF); flex: 0 0 auto; box-shadow: 0 3px 8px rgba(100,80,220,0.3);\"><\u002Fspan>\n                  <span style=\"font-size: 21px; font-weight: 600; color: #1D1D1F;\">AI 会不会在十年内取代大部分程序员<\u002Fspan>\n                <\u002Fdiv>\n                <button style=\"{{ startStyle }}\">\n                  <svg width=\"15\" height=\"15\" viewBox=\"0 0 16 16\" fill=\"currentColor\"><path d=\"M4 2.5v11a1 1 0 0 0 1.5.87l9-5.5a1 1 0 0 0 0-1.74l-9-5.5A1 1 0 0 0 4 2.5z\"><\u002Fpath><\u002Fsvg>\n                  开始辩论\n                <\u002Fbutton>\n              <\u002Fdiv>\n              <div style=\"margin-top: 13px; font-size: 13.5px; color: #A1A1A8;\">{{ startHint }}<\u002Fdiv>\n\n              <div style=\"margin-top: 38px; font-size: 13px; font-weight: 700; letter-spacing: 0.1em; color: #A1A1A8;\">对阵设置<\u002Fdiv>\n              <div style=\"margin-top: 16px; display: grid; grid-template-columns: 1fr 56px 1fr 0.66fr; gap: 14px; align-items: stretch;\">\n                <div style=\"border-radius: 18px; padding: 18px 20px; background: linear-gradient(180deg, #F5F1FF 0%, #FCFBFF 100%); border: 1px solid rgba(124,92,255,0.20); box-shadow: 0 8px 22px -12px rgba(108,80,255,0.28);\">\n                  <div style=\"display: flex; align-items: center; gap: 9px;\"><span style=\"width: 9px; height: 9px; border-radius: 50%; background: #7C5CFF; box-shadow: 0 0 0 4px rgba(124,92,255,0.16);\"><\u002Fspan><span style=\"font-size: 14px; font-weight: 700; color: #6B4DE0;\">正方 · 支持<\u002Fspan><\u002Fdiv>\n                  <div style=\"margin-top: 14px; display: flex; align-items: center; justify-content: space-between; height: 50px; padding: 0 10px 0 12px; border-radius: 13px; background: #fff; border: 1px solid rgba(0,0,0,0.06); box-shadow: 0 2px 8px rgba(0,0,0,0.04);\">\n                    <div style=\"display: flex; align-items: center; gap: 11px;\"><span style=\"width: 30px; height: 30px; border-radius: 9px; background: linear-gradient(135deg, #16161A, #3C3C46); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800;\">K<\u002Fspan><span style=\"font-size: 16px; font-weight: 600;\">Kimi<\u002Fspan><\u002Fdiv>\n                    <svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\" stroke=\"#C2C2CB\" stroke-width=\"1.6\" stroke-linecap=\"round\"><path d=\"M4 6.5 8 10l4-3.5\"><\u002Fpath><\u002Fsvg>\n                  <\u002Fdiv>\n                  <div style=\"margin-top: 13px;\"><span style=\"{{ proPillStyle }}\"><span style=\"{{ proDotStyle }}\"><\u002Fspan>{{ proPillText }}<\u002Fspan><\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"display: flex; align-items: center; justify-content: center;\"><span style=\"display: flex; align-items: center; justify-content: center; width: 46px; height: 46px; border-radius: 50%; background: #fff; border: 1px solid rgba(0,0,0,0.06); box-shadow: 0 8px 18px -8px rgba(0,0,0,0.18); font-size: 13px; font-weight: 800; color: #9A9AA2; letter-spacing: 0.05em;\">VS<\u002Fspan><\u002Fdiv>\n                <div style=\"border-radius: 18px; padding: 18px 20px; background: linear-gradient(180deg, #EEF4FF 0%, #FAFCFF 100%); border: 1px solid rgba(46,139,255,0.20); box-shadow: 0 8px 22px -12px rgba(46,139,255,0.26);\">\n                  <div style=\"display: flex; align-items: center; gap: 9px;\"><span style=\"width: 9px; height: 9px; border-radius: 50%; background: #2E8BFF; box-shadow: 0 0 0 4px rgba(46,139,255,0.16);\"><\u002Fspan><span style=\"font-size: 14px; font-weight: 700; color: #1E72E0;\">反方 · 反对<\u002Fspan><\u002Fdiv>\n                  <div style=\"margin-top: 14px; display: flex; align-items: center; justify-content: space-between; height: 50px; padding: 0 10px 0 12px; border-radius: 13px; background: #fff; border: 1px solid rgba(0,0,0,0.06); box-shadow: 0 2px 8px rgba(0,0,0,0.04);\">\n                    <div style=\"display: flex; align-items: center; gap: 11px;\"><span style=\"width: 30px; height: 30px; border-radius: 9px; background: linear-gradient(135deg, #2E6BFF, #4FA6FF); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800;\">通<\u002Fspan><span style=\"font-size: 16px; font-weight: 600;\">通义千问<\u002Fspan><\u002Fdiv>\n                    <svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\" stroke=\"#C2C2CB\" stroke-width=\"1.6\" stroke-linecap=\"round\"><path d=\"M4 6.5 8 10l4-3.5\"><\u002Fpath><\u002Fsvg>\n                  <\u002Fdiv>\n                  <div style=\"margin-top: 13px;\"><span style=\"{{ conPillStyle }}\"><span style=\"{{ conDotStyle }}\"><\u002Fspan>{{ conPillText }}<\u002Fspan><\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"border-radius: 18px; padding: 18px 20px; background: #fff; border: 1px solid rgba(0,0,0,0.07); box-shadow: 0 6px 18px -12px rgba(40,30,80,0.16); display: flex; flex-direction: column;\">\n                  <span style=\"font-size: 14px; font-weight: 700; color: #86868B;\">回合数<\u002Fspan>\n                  <div style=\"flex: 1; display: flex; align-items: center; justify-content: center; gap: 16px;\">\n                    <span style=\"display: flex; align-items: center; justify-content: center; width: 34px; height: 34px; border-radius: 10px; background: #F2F2F5; color: #6E6E73; font-size: 20px; font-weight: 500; cursor: pointer;\">−<\u002Fspan>\n                    <div style=\"text-align: center;\"><span style=\"font-size: 36px; font-weight: 700; letter-spacing: -0.02em;\">5<\u002Fspan><span style=\"font-size: 14px; color: #86868B; margin-left: 5px;\">回合<\u002Fspan><\u002Fdiv>\n                    <span style=\"display: flex; align-items: center; justify-content: center; width: 34px; height: 34px; border-radius: 10px; background: #F2F2F5; color: #6E6E73; font-size: 20px; font-weight: 400; cursor: pointer;\">+<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <div style=\"margin-top: 32px; display: flex; align-items: center; gap: 14px; padding: 18px 22px; border-radius: 16px; background: linear-gradient(180deg, #FFFFFF, #FAFAFC); border: 1px solid rgba(0,0,0,0.06); box-shadow: 0 6px 18px -12px rgba(40,30,80,0.12);\">\n                <svg width=\"20\" height=\"20\" viewBox=\"0 0 20 20\" fill=\"none\" stroke=\"#9A7CFF\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M10 13.5V9.5\"><\u002Fpath><circle cx=\"10\" cy=\"6.6\" r=\"0.6\" fill=\"#9A7CFF\"><\u002Fcircle><circle cx=\"10\" cy=\"10\" r=\"7.5\"><\u002Fcircle><\u002Fsvg>\n                <span style=\"font-size: 14.5px; color: #6E6E73; line-height: 1.6;\">登录在<b style=\"color: #1D1D1F;\">「正方 · Kimi」<\u002Fb>与<b style=\"color: #1D1D1F;\">「反方 · 通义千问」<\u002Fb>标签页内完成——两个标签的状态点都变绿，即可开始辩论。<\u002Fspan>\n                <span style=\"flex: 1;\"><\u002Fspan>\n                <div style=\"display: flex; gap: 16px; font-size: 12.5px; color: #86868B; white-space: nowrap;\">\n                  <span style=\"display: flex; align-items: center; gap: 6px;\"><span style=\"width: 8px; height: 8px; border-radius: 50%; background: #FF453A;\"><\u002Fspan>未登录<\u002Fspan>\n                  <span style=\"display: flex; align-items: center; gap: 6px;\"><span style=\"width: 8px; height: 8px; border-radius: 50%; background: #FF9F0A;\"><\u002Fspan>检测中<\u002Fspan>\n                  <span style=\"display: flex; align-items: center; gap: 6px;\"><span style=\"width: 8px; height: 8px; border-radius: 50%; background: #30D158;\"><\u002Fspan>已登录<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- debate record (after start) -->\n        <sc-if value=\"{{ isDebate }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"height: 768px; display: flex; flex-direction: column;\">\n            <div style=\"height: 66px; flex: 0 0 auto; display: flex; align-items: center; gap: 24px; padding: 0 36px; border-bottom: 1px solid rgba(0,0,0,0.06); background: linear-gradient(180deg, #FFFFFF, #FBFAFD);\">\n              <div style=\"flex: 1; min-width: 0;\">\n                <div style=\"font-size: 11px; font-weight: 700; letter-spacing: 0.14em; color: #A1A1A8;\">辩题<\u002Fdiv>\n                <div style=\"font-size: 17px; font-weight: 600; color: #1D1D1F; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px;\">AI 会不会在十年内取代大部分程序员<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display: flex; align-items: center; gap: 13px; flex: 0 0 auto;\">\n                <div style=\"width: 130px; height: 7px; border-radius: 999px; background: #ECECEF; overflow: hidden;\"><div style=\"height: 100%; width: {{ progPct }}; border-radius: 999px; background: linear-gradient(90deg, #7C5CFF, #3E8BFF);\"><\u002Fdiv><\u002Fdiv>\n                <span style=\"font-size: 14px; font-weight: 500; color: #6E6E73; white-space: nowrap;\">第 <b style=\"font-weight: 700; color: #1D1D1F;\">{{ progNow }}<\u002Fb>/5 回合<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display: flex; gap: 10px; flex: 0 0 auto;\">\n                <button style=\"{{ copyStyle }}\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 16 16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\"><rect x=\"5\" y=\"5\" width=\"9\" height=\"9\" rx=\"2\"><\u002Frect><path d=\"M11 5V3.5A1.5 1.5 0 0 0 9.5 2H3.5A1.5 1.5 0 0 0 2 3.5v6A1.5 1.5 0 0 0 3.5 11H5\"><\u002Fpath><\u002Fsvg>复制全文<\u002Fbutton>\n                <sc-if value=\"{{ isLive }}\" hint-placeholder-val=\"{{ true }}\"><button style=\"display: inline-flex; align-items: center; gap: 8px; height: 42px; padding: 0 18px; border: none; border-radius: 12px; font: inherit; font-size: 14px; font-weight: 600; color: #fff; cursor: pointer; background: linear-gradient(135deg, #FF5F57, #FF3B30); box-shadow: 0 10px 22px -8px rgba(255,59,48,0.5);\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 16 16\" fill=\"currentColor\"><rect x=\"3\" y=\"3\" width=\"10\" height=\"10\" rx=\"2.5\"><\u002Frect><\u002Fsvg>停止<\u002Fbutton><\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"flex: 1; min-height: 0; overflow-y: auto; padding: 28px 56px 34px; background: linear-gradient(180deg, #FCFCFE, #F6F6FA);\">\n              <div style=\"max-width: 1000px; margin: 0 auto;\">\n                <div style=\"display: flex; align-items: center; gap: 14px; margin: 2px 0 20px;\"><span style=\"font-size: 12px; font-weight: 700; letter-spacing: 0.1em; color: #A1A1A8;\">第 1 回合<\u002Fspan><span style=\"flex: 1; height: 1px; background: rgba(0,0,0,0.07);\"><\u002Fspan><\u002Fdiv>\n\n                <div style=\"display: flex; gap: 14px; margin-bottom: 24px;\">\n                  <span style=\"width: 42px; height: 42px; flex: 0 0 auto; border-radius: 13px; background: linear-gradient(135deg, #16161A, #3C3C46); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 800;\">K<\u002Fspan>\n                  <div style=\"max-width: 82%;\">\n                    <div style=\"display: flex; align-items: center; gap: 8px; margin-bottom: 8px;\"><span style=\"font-size: 14px; font-weight: 700; color: #6B4DE0;\">Kimi<\u002Fspan><span style=\"font-size: 11px; font-weight: 700; color: #6B4DE0; background: #F1ECFF; padding: 2px 8px; border-radius: 6px;\">正方 · 支持<\u002Fspan><\u002Fdiv>\n                    <div style=\"padding: 15px 19px; border-radius: 6px 17px 17px 17px; background: linear-gradient(135deg, #F4F0FF, #FBFAFF); border: 1px solid rgba(124,92,255,0.18); box-shadow: 0 8px 20px -12px rgba(108,80,255,0.22); font-size: 15.5px; line-height: 1.78; color: #2A2A30;\">十年内，大模型的代码生成能力会覆盖绝大多数标准化开发任务。今天 Copilot 已能贡献约 40% 的新增代码，而这条曲线仍在加速。当自然语言需求可以被直接编译成可运行的系统时，「写代码」这件事本身就会被重新定义。<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n\n                <div style=\"display: flex; flex-direction: row-reverse; gap: 14px; margin-bottom: 30px;\">\n                  <span style=\"width: 42px; height: 42px; flex: 0 0 auto; border-radius: 13px; background: linear-gradient(135deg, #2E6BFF, #4FA6FF); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 800;\">通<\u002Fspan>\n                  <div style=\"max-width: 82%; display: flex; flex-direction: column; align-items: flex-end;\">\n                    <div style=\"display: flex; align-items: center; gap: 8px; margin-bottom: 8px;\"><span style=\"font-size: 11px; font-weight: 700; color: #1E72E0; background: #E8F1FF; padding: 2px 8px; border-radius: 6px;\">反方 · 反对<\u002Fspan><span style=\"font-size: 14px; font-weight: 700; color: #1E72E0;\">通义千问<\u002Fspan><\u002Fdiv>\n                    <div style=\"padding: 15px 19px; border-radius: 17px 6px 17px 17px; background: linear-gradient(135deg, #E8F1FF, #F6FAFF); border: 1px solid rgba(46,139,255,0.18); box-shadow: 0 8px 20px -12px rgba(46,139,255,0.22); font-size: 15.5px; line-height: 1.78; color: #2A2A30;\">代码只是软件工程的冰山一角。真正稀缺的，是厘清模糊需求、权衡架构取舍、并为最终结果负责的判断力。AI 能更快地写出代码，却无法替你决定「要不要做」，更无法在出错时承担后果。<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n\n                <div style=\"display: flex; align-items: center; gap: 14px; margin: 2px 0 20px;\"><span style=\"font-size: 12px; font-weight: 700; letter-spacing: 0.1em; color: #A1A1A8;\">第 2 回合<\u002Fspan><span style=\"flex: 1; height: 1px; background: rgba(0,0,0,0.07);\"><\u002Fspan><\u002Fdiv>\n\n                <div style=\"display: flex; gap: 14px; margin-bottom: 24px;\">\n                  <span style=\"width: 42px; height: 42px; flex: 0 0 auto; border-radius: 13px; background: linear-gradient(135deg, #16161A, #3C3C46); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 800;\">K<\u002Fspan>\n                  <div style=\"max-width: 82%;\">\n                    <div style=\"display: flex; align-items: center; gap: 8px; margin-bottom: 8px;\"><span style=\"font-size: 14px; font-weight: 700; color: #6B4DE0;\">Kimi<\u002Fspan><span style=\"font-size: 11px; font-weight: 700; color: #6B4DE0; background: #F1ECFF; padding: 2px 8px; border-radius: 6px;\">正方 · 支持<\u002Fspan><\u002Fdiv>\n                    <div style=\"padding: 15px 19px; border-radius: 6px 17px 17px 17px; background: linear-gradient(135deg, #F4F0FF, #FBFAFF); border: 1px solid rgba(124,92,255,0.18); box-shadow: 0 8px 20px -12px rgba(108,80,255,0.22); font-size: 15.5px; line-height: 1.78; color: #2A2A30;\">判断力同样可以被建模。当 AI 能够通读整个代码库、自动回滚自己的错误、并用线上指标评估每一次改动时，「负责」就退化成了一个可被优化的目标函数。我们一直高估了人类直觉的不可替代性。<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n\n                <sc-if value=\"{{ isLive }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"display: flex; flex-direction: row-reverse; gap: 14px; margin-bottom: 12px;\">\n                    <span style=\"width: 42px; height: 42px; flex: 0 0 auto; border-radius: 13px; background: linear-gradient(135deg, #2E6BFF, #4FA6FF); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 800;\">通<\u002Fspan>\n 织结构、协作方式与责任制度的演化速度，远远慢于模型参数的增长曲线。<\u002Fsc-if><\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"flex: 0 0 auto; padding: 16px 30px 22px;\">\n                  <div style=\"max-width: 640px; margin: 0 auto; height: 52px; display: flex; align-items: center; gap: 10px; padding: 0 18px; border-radius: 14px; background: #F2F2F4; border: 1px solid rgba(0,0,0,0.06); font-size: 13.5px; color: #AEAEB6;\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 16 16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\"><rect x=\"3.5\" y=\"7\" width=\"9\" height=\"6.3\" rx=\"1.5\"><\u002Frect><path d=\"M5.5 7V5.2a2.5 2.5 0 0 1 5 0V7\"><\u002Fpath><\u002Fsvg>辩论进行中，输入已由 AI 辩论台托管<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <!-- floating phase switcher -->\n  <div style=\"position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 50; display: flex; align-items: center; gap: 6px; padding: 7px 8px 7px 16px; border-radius: 999px; background: rgba(255,255,255,0.72); backdrop-filter: saturate(180%) blur(24px); -webkit-backdrop-filter: saturate(180%) blur(24px); border: 1px solid rgba(255,255,255,0.9); box-shadow: 0 18px 50px -12px rgba(40,28,90,0.30), 0 3px 10px rgba(0,0,0,0.06);\">\n    <span style=\"font-size: 12px; font-weight: 600; color: #A1A1A8; letter-spacing: 0.04em; margin-right: 4px;\">演示阶段<\u002Fspan>\n    <button onclick=\"{{ goA }}\" style=\"{{ sa }}\">① 准备 · 未就绪<\u002Fbutton>\n    <button onclick=\"{{ goB }}\" style=\"{{ sb }}\">② 准备 · 全就绪<\u002Fbutton>\n    <button onclick=\"{{ goC }}\" style=\"{{ sc }}\">③ 辩论进行中<\u002Fbutton>\n    <button onclick=\"{{ goD }}\" style=\"{{ sd }}\">④ 辩论已结束<\u002Fbutton>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;: {&quot;width&quot;: 1420, &quot;height&quot;: 1010}}\">\nclass Component extends DCLogic {\n  state = { view: 'prep-partial', tab: 'chat' };\n  renderVals() {\n    const v = this.props.view ?? this.state.view;\n    const tab = this.state.tab;\n    const isPrep = v === 'prep-partial' || v === 'prep-ready';\n    const isDebate = v === 'debate-live' || v === 'debate-done';\n    const ready = v === 'prep-ready';\n    const isLive = v === 'debate-live';\n    const isDone = v === 'debate-done';\n    const locked = isDebate;\n    const setView = (id) => () => this.setState({ view: id });\n    const setTab = (id) => () => this.setState({ tab: id });\n\n    const sw = (active) => `padding:9px 14px;border:none;border-radius:999px;font:inherit;font-size:12.5px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .28s cubic-bezier(.4,0,.2,1);${active ? 'background:#1D1D1F;color:#fff;box-shadow:0 5px 16px rgba(0,0,0,0.24);' : 'background:transparent;color:#86868B;'}`;\n    const tabStyle = (active) => `display:inline-flex;align-items:center;gap:8px;height:40px;padding:0 16px;border:none;border-radius:11px;font:inherit;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .2s;${active ? 'background:#FBFBFD;color:#1D1D1F;box-shadow:0 4px 12px -3px rgba(40,30,80,0.20),0 1px 3px rgba(0,0,0,0.06);' : 'background:transparent;color:#86868B;'}`;\n\n    const cMap = { green: ['#E7F8EC', '#1E8E3E', '#30D158'], yellow: ['#FFF6E5', '#B7791F', '#FF9F0A'], red: ['#FDECEB', '#D93A33', '#FF453A'] };\n    const dot = (k) => `width:8px;height:8px;border-radius:50%;flex:0 0 auto;background:${cMap[k][2]};${k === 'yellow' ? 'animation:scPulse 1.1s ease-in-out infinite;' : ''}${k === 'green' ? 'box-shadow:0 0 0 3px ' + cMap[k][2] + '33;' : ''}`;\n    const pill = (k) => `display:inline-flex;align-items:center;gap:7px;padding:6px 13px;border-radius:999px;font-size:13px;font-weight:600;background:${cMap[k][0]};color:${cMap[k][1]};`;\n    const proK = (v === 'prep-partial') ? 'yellow' : 'green';\n    const conK = (v === 'prep-partial') ? 'red' : 'green';\n\n    const phaseStyleBase = 'display:inline-flex;align-items:center;gap:7px;padding:5px 13px;border-radius:999px;font-size:12.5px;font-weight:600;';\n    const phaseBadgeStyle = isPrep\n      ? phaseStyleBase + 'background:#E9E9EE;color:#86868B;'\n      : (isLive ? phaseStyleBase + 'background:#E7F8EC;color:#1E8E3E;' : phaseStyleBase + 'background:#F1ECFF;color:#6B4DE0;');\n\n    return {\n      view: v, tab,\n      isPrep, isDebate, ready, isLive, isDone, locked,\n      isPartial: v === 'prep-partial',\n      tabChat: tab === 'chat', tabPro: tab === 'pro', tabCon: tab === 'con',\n      goChat: setTab('chat'), goPro: setTab('pro'), goCon: setTab('con'),\n      goA: setView('prep-partial'), goB: setView('prep-ready'), goC: setView('debate-live'), goD: setView('debate-done'),\n      sa: sw(v === 'prep-partial'), sb: sw(v === 'prep-ready'), sc: sw(v === 'debate-live'), sd: sw(v === 'debate-done'),\n      chatTabStyle: tabStyle(tab === 'chat'), proTabStyle: tabStyle(tab === 'pro'), conTabStyle: tabStyle(tab === 'con'),\n      proTabDot: dot(proK), conTabDot: dot(conK),\n      proDotStyle: dot(proK), conDotStyle: dot(conK),\n      proPillStyle: pill(proK), conPillStyle: pill(conK),\n      proPillText: (v === 'prep-partial') ? '检测中…' : '已登录',\n      conPillText: (v === 'prep-partial') ? '未登录' : '已登录',\n      startStyle: ready\n        ? 'display:inline-flex;align-items:center;gap:10px;padding:0 38px;height:64px;border:none;border-radius:16px;font:inherit;font-size:19px;font-weight:600;color:#fff;cursor:pointer;background:linear-gradient(135deg,#7C5CFF 0%,#5B7BFF 100%);box-shadow:0 16px 38px -10px rgba(108,80,255,0.62),inset 0 1px 0 rgba(255,255,255,0.35);'\n        : 'display:inline-flex;align-items:center;gap:10px;padding:0 38px;height:64px;border:none;border-radius:16px;font:inherit;font-size:19px;font-weight:600;color:#B6B6BE;cursor:not-allowed;background:#EAEAEF;',\n      startHint: ready ? '两位 AI 均已就绪，点击开始自动辩论' : '请在「反方 · 通义千问」标签页完成网页登录',\n      progNow: isLive ? 2 : 5,\n      progPct: isLive ? '40%' : '100%',\n      copyStyle: isDone\n        ? 'display:inline-flex;align-items:center;gap:8px;height:42px;padding:0 20px;border:none;border-radius:12px;font:inherit;font-size:14px;font-weight:600;color:#fff;cursor:pointer;background:#1D1D1F;box-shadow:0 10px 22px -8px rgba(0,0,0,0.42);'\n        : 'display:inline-flex;align-items:center;gap:8px;height:42px;padding:0 18px;border-radius:12px;font:inherit;font-size:14px;font-weight:600;color:#3A3A40;cursor:pointer;background:#fff;border:1px solid rgba(0,0,0,0.12);',\n      engAnim: isLive ? 'scShimmer 1.4s linear infinite' : 'none',\n      phaseBadge: isPrep ? '准备中' : (isLive ? '辩论进行中' : '辩论已结束'),\n      phaseBadgeStyle,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
